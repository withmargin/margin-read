name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Extension security checks
        run: pnpm check:extension

      - name: Build
        run: pnpm build

      - name: Package extension
        run: pnpm package:extension

      - name: Upload extension package
        uses: actions/upload-artifact@v4
        with:
          name: margin-read-extension
          path: artifacts/*.zip
          if-no-files-found: error
