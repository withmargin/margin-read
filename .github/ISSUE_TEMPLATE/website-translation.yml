name: Website translation issue
description: Report skipped text, duplicate translation, wrong insertion, or poor webpage layout.
title: "[Website]: "
labels:
  - beta
  - extraction
body:
  - type: input
    id: url
    attributes:
      label: Page URL
      description: Use a public URL when possible.
      placeholder: https://example.com/article
    validations:
      required: true
  - type: dropdown
    id: problem
    attributes:
      label: Problem type
      options:
        - Text was skipped
        - Translation appeared in the wrong place
        - Translation was duplicated
        - Non-reading UI was translated
        - Translation style was hard to read
        - Page changed or broke after translation
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what should have happened.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe what happened instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Margin version
      description: Find this in chrome://extensions.
      placeholder: 0.3.1
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 125, Edge 125, Arc, Brave, etc.
    validations:
      required: true
  - type: input
    id: languages
    attributes:
      label: Source and target language
      placeholder: English to Traditional Chinese
  - type: input
    id: display
    attributes:
      label: Display settings
      placeholder: Integrated, highlighted, marker on/off, etc.
  - type: textarea
    id: diagnostics
    attributes:
      label: Popup diagnostics
      description: Include detected blocks, queued blocks, latest error, or sample text if useful.
      render: text
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Drag screenshots here when layout or visual style is involved.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include API keys, private page contents, account tokens, or confidential data.
          required: true

