name: General beta feedback
description: Share beta feedback that is not tied to one specific broken page.
title: "[Beta feedback]: "
labels:
  - beta
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Onboarding
        - Translation quality
        - Reading experience
        - Visual style
        - Privacy or trust
        - Performance
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What worked, what did not, and what would make Margin easier to use?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Margin version
      placeholder: 0.3.1
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 125, Edge 125, Arc, Brave, etc.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include API keys, private page contents, account tokens, or confidential data.
          required: true

