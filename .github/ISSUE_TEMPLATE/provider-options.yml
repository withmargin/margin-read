name: Provider or options issue
description: Report API key, model fetching, endpoint, cache, or options UI problems.
title: "[Provider]: "
labels:
  - beta
  - provider
body:
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - OpenAI
        - Anthropic Claude
        - Google Gemini
        - OpenAI Compatible / Local LLM
        - Unsure
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      placeholder: gpt-4.1-mini, claude-haiku-4-5-20251001, gemini-2.5-flash, etc.
  - type: dropdown
    id: problem
    attributes:
      label: Problem type
      options:
        - API key was rejected
        - Fetch models failed
        - Endpoint was confusing
        - Local LLM did not respond
        - Translation request failed
        - Cache behavior was confusing
        - Options UI was confusing
        - Other
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error message
      description: Paste the visible error. Remove API keys or private content first.
      render: text
  - type: input
    id: version
    attributes:
      label: Margin version
      placeholder: 0.3.1
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 125, Edge 125, Arc, Brave, etc.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include API keys, private page contents, account tokens, or confidential data.
          required: true

