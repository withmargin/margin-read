name: YouTube captions issue
description: Report bilingual caption timing, availability, language, or player control problems.
title: "[YouTube]: "
labels:
  - beta
  - youtube
body:
  - type: input
    id: url
    attributes:
      label: YouTube URL
      placeholder: https://www.youtube.com/watch?v=...
    validations:
      required: true
  - type: dropdown
    id: problem
    attributes:
      label: Problem type
      options:
        - Margin button did not appear in the player
        - Caption track was not detected
        - Bilingual captions did not appear
        - Captions were late or out of sync
        - Translation was poor or wrong
        - Captions disappeared after YouTube captions were closed
        - Provider or rate limit error
        - Other
    validations:
      required: true
  - type: input
    id: captions
    attributes:
      label: Original caption availability
      placeholder: Creator subtitles, auto-generated subtitles, no subtitles, unsure
    validations:
      required: true
  - type: input
    id: languages
    attributes:
      label: Caption and target language
      placeholder: English captions to Traditional Chinese
  - type: textarea
    id: actual
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Margin version
      placeholder: 0.3.1
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 125, Edge 125, Arc, Brave, etc.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include API keys, private videos, account tokens, or confidential data.
          required: true

