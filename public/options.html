<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toast Translate Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Toast Options</h1>
      <form id="settings-form">
        <label>
          Provider
          <select name="provider">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic Claude</option>
            <option value="google">Google Gemini</option>
            <option value="openai-compatible">OpenAI Compatible</option>
          </select>
        </label>
        <fieldset>
          <legend>Local LLM presets</legend>
          <label>
            Endpoint preset
            <select id="local-endpoint-preset">
              <option value="">Select a local runtime</option>
              <option value="http://localhost:1234/v1/chat/completions">LM Studio</option>
              <option value="http://localhost:11434/v1/chat/completions">Ollama</option>
              <option value="http://localhost:8080/v1/chat/completions">llama.cpp server</option>
            </select>
            <span class="hint">Presets switch the provider to OpenAI Compatible and fill the endpoint.</span>
          </label>
          <label class="checkbox">
            <input name="openAICompatibleJsonMode" type="checkbox" />
            <span>
              Request JSON mode
              <span class="hint">Disable this if a local runtime rejects the OpenAI response_format field.</span>
            </span>
          </label>
        </fieldset>
        <label>
          Provider endpoint
          <input name="providerEndpoint" type="url" required />
        </label>
        <label>
          API key
          <input name="apiKey" type="password" autocomplete="off" />
          <span class="hint">Paste the raw provider API key. Local OpenAI-compatible endpoints can leave this empty.</span>
        </label>
        <label>
          Model
          <select id="model-select">
            <option value="">Fetch models or use custom model below</option>
          </select>
          <input name="model" type="text" required />
          <span class="hint">Select a fetched model or enter a custom model name.</span>
        </label>
        <label>
          Source language
          <input name="sourceLanguage" type="text" placeholder="auto" />
        </label>
        <label>
          Target language
          <input name="targetLanguage" type="text" required />
        </label>
        <label>
          Display style
          <select name="displayStyle">
            <option value="integrated">Integrated</option>
            <option value="highlighted">Highlighted</option>
          </select>
        </label>
        <label>
          Cache behavior
          <select name="cacheMode">
            <option value="persistent">Persistent</option>
            <option value="session">Session only</option>
            <option value="disabled">Disabled</option>
          </select>
        </label>
        <fieldset>
          <legend>X optimization</legend>
          <label class="checkbox">
            <input name="xOptimizedTranslation" type="checkbox" />
            <span>
              Optimize X timelines
              <span class="hint">Translate only tweet text from X timeline cards by default.</span>
            </span>
          </label>
          <label class="checkbox">
            <input name="xTranslateArticles" type="checkbox" />
            <span>
              Translate X articles
              <span class="hint">Translate X longform article titles and readable rich text blocks.</span>
            </span>
          </label>
          <label class="checkbox">
            <input name="xTranslateQuotedPosts" type="checkbox" />
            <span>
              Translate quoted posts
              <span class="hint">Also translate nested quoted post text inside X cards.</span>
            </span>
          </label>
          <label class="checkbox">
            <input name="xSkipNativeTranslatedPosts" type="checkbox" />
            <span>
              Skip X translated posts
              <span class="hint">Avoid retranslating posts that X already marks as translated.</span>
            </span>
          </label>
        </fieldset>
        <label class="checkbox">
          <input name="debugMode" type="checkbox" />
          <span>
            Debug mode
            <span class="hint">Show page detection, queue, and provider error details in the popup.</span>
          </span>
        </label>
        <div class="actions">
          <button type="submit">Save settings</button>
          <button id="fetch-models" type="button" class="secondary">Fetch models</button>
          <button id="clear-cache" type="button" class="secondary">Clear cache</button>
        </div>
      </form>
      <p id="status" role="status"></p>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
