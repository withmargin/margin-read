<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Toast Translate is a privacy-first bilingual webpage translation extension for Chrome and Chromium browsers."
    />
    <title>Toast Translate</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero__copy">
          <p class="eyebrow">Toast Translate</p>
          <h1 id="hero-title">Bilingual webpage translation that keeps the original text in place.</h1>
          <p class="lede">
            Toast inserts translations beside readable webpage content, so readers can compare source and target text
            without losing context.
          </p>
          <div class="actions">
            <a class="button button--primary" href="https://github.com/linyiru/toast">View on GitHub</a>
            <a class="button button--secondary" href="https://github.com/linyiru/toast#install-from-source">Install from source</a>
          </div>
        </div>
        <div class="product-shot" aria-label="Preview of Toast translating an article page">
          <div class="browser-bar">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="article-preview">
            <p class="line line--title"></p>
            <p class="line"></p>
            <p class="line line--short"></p>
            <p class="translation-line"></p>
            <p class="line"></p>
            <p class="line line--shorter"></p>
            <p class="translation-line translation-line--short"></p>
          </div>
          <div class="floating-button">A</div>
        </div>
      </section>
    </main>
  </body>
</html>
