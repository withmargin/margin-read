<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Margin Read places translation and notes where reading happens."
    />
    <title>Margin Read</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero__copy">
          <p class="eyebrow">Margin Read</p>
          <h1 id="hero-title">Translation and notes, placed where reading happens.</h1>
          <p class="lede">
            Margin Read keeps the original page intact and adds translations beside readable content, so you can read
            with context instead of replacing the page.
          </p>
          <div class="actions">
            <a class="button button--primary" href="https://github.com/linyiru/margin">View on GitHub</a>
            <a class="button button--secondary" href="https://github.com/linyiru/margin#install-from-source">Install from source</a>
          </div>
        </div>
        <div class="product-shot" aria-label="Preview of Margin translating an article page">
          <div class="browser-bar">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="article-preview">
            <p class="line line--title"></p>
            <p class="line"></p>
            <p class="line line--short"></p>
            <p class="translation-line"></p>
            <p class="line"></p>
            <p class="line line--shorter"></p>
            <p class="translation-line translation-line--short"></p>
          </div>
          <div class="floating-button">A</div>
        </div>
      </section>
    </main>
  </body>
</html>
