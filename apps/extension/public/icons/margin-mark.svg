<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" role="img" aria-label="Margin">
  <title>Margin</title>
  <!-- Paper page with pencil-black frame -->
  <rect x="0.5" y="0.5" width="27" height="27" rx="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Source paragraph: two black lines, full + 72% width -->
  <rect x="5" y="7.65" width="18" height="1.5" rx="0.4" fill="#1a1a1a"/>
  <rect x="5" y="10.75" width="12.96" height="1.5" rx="0.4" fill="#1a1a1a"/>

  <!-- Red pen rule running down the left edge of the translated paragraph -->
  <rect x="5" y="15.75" width="1" height="4.6" fill="#b8331f"/>

  <!-- Translated paragraph: indented 4px, two red lines, full + 72% width -->
  <rect x="9" y="15.75" width="14" height="1.5" rx="0.4" fill="#b8331f"/>
  <rect x="9" y="18.85" width="10.08" height="1.5" rx="0.4" fill="#b8331f"/>
</svg>
